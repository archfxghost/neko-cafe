<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neko-Cafe Pro</title>
    <style>
        body { background: #121212; color: #ff69b4; font-family: monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .game-box { border: 2px solid #ff69b4; padding: 20px; width: 90%; max-width: 400px; text-align: center; background: #1e1e1e; }
        button { background: #333; color: #fff; border: 1px solid #ff69b4; margin: 10px; padding: 15px; width: 80%; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>
    <div class="game-box">
        <h1>🐾 NEKO-CAFE PRO 🐾</h1>
        <pre id="cat-art">
  |\---/|
  | o_o |
   \_^_/
        </pre>
        <p id="stats">Cash: $5 | Bond: 0/10 | Tricks: 0</p>
        <p id="message">Welcome, Evelyn!</p>
        <button id="btnServe">Serve Coffee</button>
        <button id="btnBond">Bond with Neko</button>
        <button id="btnTrick">Teach Trick</button>
        <button id="btnPerform">Performance</button>
    </div>

    <script>
        let cash = 5, bond = 0, tricks = 0;
        const update = () => {
            document.getElementById('stats').innerText = `Cash: $${cash} | Bond: ${bond}/10 | Tricks: ${tricks}`;
        };

        document.getElementById('btnServe').addEventListener('click', () => { 
            cash += 2; document.getElementById('message').innerText = "Coffee served! +$2"; update(); 
        });

        document.getElementById('btnBond').addEventListener('click', () => { 
            if(cash > 0) { cash--; bond = Math.min(bond + 1, 10); document.getElementById('message').innerText = "Bond increased!"; } 
            else { document.getElementById('message').innerText = "Broke! Serve coffee!"; } update(); 
        });

        document.getElementById('btnTrick').addEventListener('click', () => { 
            if(bond >= 2) { bond -= 2; tricks++; document.getElementById('message').innerText = "New trick learned!"; } 
            else { document.getElementById('message').innerText = "Need 2 Bond!"; } update(); 
        });

        document.getElementById('btnPerform').addEventListener('click', () => { 
            if(tricks > 0) { cash += (tricks * 5); document.getElementById('message').innerText = "Show time! Earned $" + (tricks * 5); } 
            else { document.getElementById('message').innerText = "No tricks!"; } update(); 
        });
    </script>
</body>
</html>
