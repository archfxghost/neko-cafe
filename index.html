<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Neko-Cafe Pro</title>
    <style>
        body { background: #121212; color: #ff69b4; font-family: monospace; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .game-box { border: 2px solid #ff69b4; padding: 20px; width: 90%; max-width: 400px; text-align: center; background: #1e1e1e; margin-bottom: 20px; }
        .rules-box { border: 1px dashed #ff69b4; padding: 15px; width: 90%; max-width: 400px; color: #aaa; font-size: 12px; text-align: left; }
        button { background: #333; color: #fff; border: 2px solid #ff69b4; margin: 8px; padding: 20px; width: 90%; cursor: pointer; font-size: 18px; font-weight: bold; }
        #cat-art { font-size: 16px; white-space: pre; margin: 10px 0; }
    </style>
</head>
<body>
    <div class="game-box">
        <h1>🐾 NEKO-CAFE PRO 🐾</h1>
        <pre id="cat-art">  |\---/|
  | o_o |
   \_^_/</pre>
        <p id="stats">Cash: $5 | Bond: 0/10 | Tricks: 0</p>
        <p id="message">Welcome, Architect!</p>
        <button id="btnServe">Serve Coffee</button>
        <button id="btnBond">Bond with Neko</button>
        <button id="btnTrick">Teach Trick</button>
        <button id="btnPerform">Performance</button>
    </div>

    <div class="rules-box">
        <h3>How to Play:</h3>
        * Serve Coffee to earn cash.<br>
        * Use cash to build Bond.<br>
        * Spend 2 Bond to Teach a Trick.<br>
        * Perform to earn big cash.<br>
        * <b>Goal: Teach 10 Tricks to win!</b>
    </div>

    <script>
        let cash = 5, bond = 0, tricks = 0;
        const audio = new Audio('https://actions.google.com/sounds/v1/ui/button_toggle.ogg');

        // Global Unlocker: The first interaction anywhere on the screen unlocks audio
        document.body.addEventListener('click', () => { audio.play().then(()=>{}).catch(()=>{}); }, { once: true });

        const update = () => {
            if (tricks >= 10) {
                document.getElementById('message').innerText = "🏆 MASTERY ACHIEVED: You are the Neko Market Maker!";
                return;
            }
            document.getElementById('stats').innerText = `Cash: $${cash} | Bond: ${bond}/10 | Tricks: ${tricks}`;
            const art = document.getElementById('cat-art');
            if (bond >= 8) art.innerText = "  |\\---/|\n  | ^_^ |\n   \\_^_/";
            else if (bond > 0) art.innerText = "  |\\---/|\n  | O_O |\n   \\_^_/";
            else art.innerText = "  |\\---/|\n  | o_o |\n   \\_^_/";
        };

        const execute = (action) => {
            audio.currentTime = 0;
            audio.play().catch(()=>{});
            action();
            update();
        };

        document.getElementById('btnServe').addEventListener('click', () => execute(() => { cash += 2; }));
        document.getElementById('btnBond').addEventListener('click', () => execute(() => { if(cash > 0) { cash--; bond = Math.min(bond + 1, 10); } }));
        document.getElementById('btnTrick').addEventListener('click', () => execute(() => { if(bond >= 2) { bond -= 2; tricks++; } }));
        document.getElementById('btnPerform').addEventListener('click', () => execute(() => { if(tricks > 0) { cash += (tricks * 5); } }));
    </script>
</body>
</html>
